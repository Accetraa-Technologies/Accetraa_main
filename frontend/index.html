<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      theme-color must match $color-primary (#0038A8) defined in _variables.scss.
      Controls browser chrome color on mobile.
    -->
    <meta name="theme-color" content="#0038A8" />
    <meta name="description" content="Accetraa — Enterprise technology and digital transformation consulting." />

    <title>Accetraa</title>

    <!--
      Font loading strategy:
      1. dns-prefetch  — resolve DNS for gstatic early (free, no connection)
      2. preconnect    — open TCP+TLS to googleapis (CSS download) and gstatic (font files)
      3. preload       — fetch the CSS file as high-priority, non-render-blocking
      4. onload swap   — switch rel from preload→stylesheet once downloaded
      5. noscript      — synchronous fallback for JS-disabled environments

      This pattern eliminates the render-blocking Google Fonts request and
      reduces CLS by making the font available before first meaningful paint.
    -->
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
